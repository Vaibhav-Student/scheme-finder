<style type="text/tailwindcss">
        @layer utilities {
            .bg-level-0 {
                @apply bg-[#FFFFFF];
            }
            .bg-level-1 {
                @apply bg-[#F8FAFC];
            }
            .border-light {
                @apply border border-[#E2E8F0];
            }
            .border-subtle {
                @apply border border-[#F1F5F9];
            }
            .bg-mesh {
                background-color: #f0f4ff;
                background-image: 
                    radial-gradient(at 40% 20%, hsla(250,100%,94%,1) 0px, transparent 50%),
                    radial-gradient(at 80% 0%, hsla(240,100%,96%,1) 0px, transparent 50%),
                    radial-gradient(at 0% 50%, hsla(260,100%,95%,1) 0px, transparent 50%),
                    radial-gradient(at 80% 50%, hsla(250,100%,93%,1) 0px, transparent 50%),
                    radial-gradient(at 0% 100%, hsla(240,100%,94%,1) 0px, transparent 50%),
                    radial-gradient(at 80% 100%, hsla(260,100%,96%,1) 0px, transparent 50%),
                    radial-gradient(at 0% 0%, hsla(250,100%,95%,1) 0px, transparent 50%);
            }
            .bg-noise {
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
                opacity: 0.03;
                pointer-events: none;
            }
        }
    </style>

<body class="bg-mesh min-h-screen flex flex-col font-body-md text-on-surface antialiased selection:bg-primary-container selection:text-on-primary-container relative">
<div class="fixed inset-0 bg-noise z-0"></div>
<!-- TopAppBar -->
<header class="bg-transparent docked full-width top-0 flat no shadows flex justify-between items-center w-full px-md py-sm max-w-container-max mx-auto relative z-10">
<div class="flex items-center gap-xs">
<span class="material-symbols-outlined text-primary text-[32px]">hub</span>
<span class="font-headline-lg text-headline-lg font-bold text-primary">Scheme Finder</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center p-sm md:p-lg relative z-10 w-full max-w-container-max mx-auto">
<!-- Login Container -->
<div class="w-full max-w-md relative group">
<!-- Subtle Glow behind card -->
<div class="absolute -inset-1 bg-gradient-to-r from-primary/30 to-[#a78bfa]/30 rounded-[1rem] blur-xl opacity-75 group-hover:opacity-100 transition-opacity duration-500"></div>
<!-- Login Card -->
<div class="relative bg-white/70 backdrop-blur-xl border border-white/60 shadow-glass rounded-xl p-lg flex flex-col gap-lg transition-transform duration-300">
<!-- Header -->
<div class="text-center flex flex-col gap-xs">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface font-extrabold tracking-tight">Welcome Back</h1>
<p class="font-body-md text-body-md text-secondary/80 font-medium">Sign in to manage your schemes</p>
</div>
<!-- Tabs -->
<div class="bg-white/50 backdrop-blur-sm rounded-lg p-base flex border border-white/50 shadow-sm">
<button class="flex-1 py-xs px-sm rounded-DEFAULT bg-white shadow-sm font-label-md text-label-md text-on-surface font-semibold text-center transition-all">User</button>
<button class="flex-1 py-xs px-sm rounded-DEFAULT text-secondary hover:text-on-surface font-label-md text-label-md text-center transition-colors">Admin</button>
</div>
<!-- Form -->
<form class="flex flex-col gap-md">
<!-- Email Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="email">Email Address</label>
<input class="w-full bg-white/80 border-white/60 shadow-sm rounded-DEFAULT px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#4F46E5] focus:ring-4 focus:ring-[#4F46E5]/10 transition-all backdrop-blur-sm" id="email" placeholder="you@example.com" type="email"/>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface font-semibold" for="password">Password</label>
<div class="relative">
<input class="w-full bg-white/80 border-white/60 shadow-sm rounded-DEFAULT px-sm py-xs font-body-md text-body-md text-on-surface focus:outline-none focus:border-[#4F46E5] focus:ring-4 focus:ring-[#4F46E5]/10 transition-all pr-10 backdrop-blur-sm" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-sm text-secondary hover:text-on-surface focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex justify-between items-center mt-xs">
<label class="flex items-center gap-xs cursor-pointer group">
<input class="w-4 h-4 rounded-sm border-gray-300 text-[#4F46E5] focus:ring-[#4F46E5] bg-white cursor-pointer" type="checkbox"/>
<span class="font-label-md text-label-md text-secondary group-hover:text-on-surface transition-colors">Remember me</span>
</label>
<a class="font-label-md text-label-md text-[#4F46E5] font-medium hover:underline hover:text-[#4338CA] transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-[#4F46E5] to-[#6366f1] hover:from-[#4338CA] hover:to-[#4F46E5] text-white font-label-md text-label-md font-semibold py-sm rounded-DEFAULT transition-all duration-300 shadow-sm hover:shadow-glow hover:-translate-y-0.5 flex items-center justify-center gap-xs mt-sm" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</form>
<!-- Footer Text -->
<div class="text-center font-body-md text-body-md text-secondary">
                    Don't have an account? <a class="text-[#4F46E5] font-semibold hover:underline" href="#">Create new</a>
</div>
</div>
</div>
</main>
<!-- Decorative background elements for subtle depth -->
<div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
<div class="absolute -top-40 -right-40 w-96 h-96 bg-primary-fixed opacity-30 rounded-full blur-[100px]"></div>
<div class="absolute -bottom-40 -left-40 w-96 h-96 bg-surface-variant opacity-40 rounded-full blur-[100px]"></div>
</div>
</body></html>
